# config/backtest.yaml
# バックテスト用設定（閾値を緩めて投資機会を増やす）

prediction:
  confidence_threshold: 20      # 信頼度スコア閾値を低めに設定
  max_bets_per_race: 5          # 1レースあたり最大買い目数
  min_expected_value: 0.8       # 期待値基準を緩和（検証目的）

budget:
  daily_budget: 10000           # 1日の投資予算（円）
  max_single_bet_ratio: 0.3    # 単一買い目の最大配分比率 (30%)

bet_types:                      # 対象券種（まず単純な券種で検証）
  - WIN
  - PLACE
  - QUINELLA
  - WIDE

data:
  train_ratio: 0.8
  cross_validation_splits: 5

model:
  type: lightgbm
  params:
    objective: lambdarank
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 1000
